    <circle cx="328" cy="300" r="5"/>
    <circle cx="534" cy="250" r="5"/>
    <circle cx="746" cy="270" r="5"/>
    <circle cx="958" cy="208" r="5"/>
    <circle cx="1150" cy="190" r="5"/>
    <circle cx="1292" cy="154" r="5"/>
