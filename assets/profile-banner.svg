<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Nikola Cehic engineering profile banner</title>
  <desc id="desc">A restrained engineering brief for a senior fullstack engineer focused on crypto infrastructure, agent systems, and product-grade software.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d1113"/>
      <stop offset="0.55" stop-color="#101719"/>
      <stop offset="1" stop-color="#171513"/>
    </linearGradient>
    <linearGradient id="signal" x1="90" y1="292" x2="1110" y2="122" gradientUnits="userSpaceOnUse">
      <stop stop-color="#84b8c4" stop-opacity="0.2"/>
      <stop offset="0.5" stop-color="#b9d7df"/>
      <stop offset="1" stop-color="#d4bc73" stop-opacity="0.85"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#273134" stroke-opacity="0.34" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-30" y="-30" width="1260" height="480" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect x="1" y="1" width="1198" height="418" rx="28" fill="url(#panel)"/>
  <rect x="1" y="1" width="1198" height="418" rx="28" fill="url(#grid)" opacity="0.68"/>
  <path d="M84 286C205 222 323 207 438 238C556 270 646 288 760 240C870 194 966 126 1120 112" stroke="url(#signal)" stroke-width="2.4"/>
  <path d="M95 299C246 279 358 270 468 294C620 328 732 284 850 218C940 168 1032 142 1116 144" stroke="#5d6d70" stroke-opacity="0.35" stroke-width="1.2"/>
  <circle cx="182" cy="247" r="5" fill="#b9d7df"/>
  <circle cx="438" cy="238" r="5" fill="#d4bc73"/>
  <circle cx="760" cy="240" r="5" fill="#b9d7df"/>
  <circle cx="930" cy="167" r="5" fill="#d4bc73"/>
  <circle cx="1120" cy="112" r="5" fill="#b9d7df"/>
  <circle cx="760" cy="240" r="20" stroke="#b9d7df" stroke-opacity="0.26"/>
  <circle cx="760" cy="240" r="42" stroke="#b9d7df" stroke-opacity="0.13"/>
  <circle cx="262" cy="152" r="88" fill="#84b8c4" opacity="0.06" filter="url(#soft)"/>
  <circle cx="1016" cy="132" r="96" fill="#d4bc73" opacity="0.05" filter="url(#soft)"/>

  <text x="72" y="72" fill="#f1f2ec" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Nikola Cehic</text>
  <text x="72" y="99" fill="#9fb0b2" font-family="Arial, Helvetica, sans-serif" font-size="13" letter-spacing="1.8">SENIOR FULLSTACK ENGINEER</text>
  <text x="960" y="72" fill="#b9d7df" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="end" letter-spacing="1.4">BELGRADE / REMOTE / EU</text>

  <text x="72" y="176" fill="#f1f2ec" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">Infrastructure-minded product engineering.</text>
  <text x="72" y="222" fill="#c8d1d1" font-family="Arial, Helvetica, sans-serif" font-size="22">Crypto systems, agent workflows, data products, and interfaces people can trust.</text>

  <rect x="72" y="288" width="312" height="72" rx="10" fill="#101719" stroke="#2d393c"/>
  <text x="96" y="319" fill="#b9d7df" font-family="Arial, Helvetica, sans-serif" font-size="12" letter-spacing="1.5">CRYPTO INFRA</text>
  <text x="96" y="345" fill="#f1f2ec" font-family="Arial, Helvetica, sans-serif" font-size="16">Indexers, explorers, governance</text>

  <rect x="444" y="288" width="312" height="72" rx="10" fill="#101719" stroke="#2d393c"/>
  <text x="468" y="319" fill="#b9d7df" font-family="Arial, Helvetica, sans-serif" font-size="12" letter-spacing="1.5">AGENT SYSTEMS</text>
  <text x="468" y="345" fill="#f1f2ec" font-family="Arial, Helvetica, sans-serif" font-size="16">Evidence, evals, replay, traces</text>

  <rect x="816" y="288" width="312" height="72" rx="10" fill="#101719" stroke="#2d393c"/>
  <text x="840" y="319" fill="#b9d7df" font-family="Arial, Helvetica, sans-serif" font-size="12" letter-spacing="1.5">PRODUCT SURFACES</text>
  <text x="840" y="345" fill="#f1f2ec" font-family="Arial, Helvetica, sans-serif" font-size="16">React, APIs, dashboards, systems</text>

  <rect x="1" y="1" width="1198" height="418" rx="28" stroke="#263033" stroke-width="2"/>
</svg>
