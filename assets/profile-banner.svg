<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Nikola Cehic profile banner</title>
  <desc id="desc">A dark engineered banner for a senior fullstack engineer focused on AI systems, Web3 infrastructure, and product interfaces.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10151d"/>
      <stop offset="0.48" stop-color="#131a23"/>
      <stop offset="1" stop-color="#1a1715"/>
    </linearGradient>
    <linearGradient id="rail" x1="88" y1="58" x2="1114" y2="302" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8bb9c8"/>
      <stop offset="0.55" stop-color="#567889"/>
      <stop offset="1" stop-color="#c7aa7a"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" stroke="#d7e5ea" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="358" rx="27" stroke="#d8e8ee" stroke-opacity="0.12"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)"/>

  <circle cx="1024" cy="74" r="86" fill="#89bed1" fill-opacity="0.12" filter="url(#soft)"/>
  <circle cx="186" cy="300" r="104" fill="#c6aa7b" fill-opacity="0.1" filter="url(#soft)"/>

  <path d="M88 296 C225 271 338 268 456 260 C570 252 625 150 760 134 C884 119 987 103 1114 68" stroke="url(#rail)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M88 298 C226 274 339 271 457 263 C571 255 626 153 759 137 C885 122 989 107 1114 72" stroke="#0f151b" stroke-opacity="0.65" stroke-width="7" stroke-linecap="round"/>
  <path d="M88 296 C225 271 338 268 456 260 C570 252 625 150 760 134 C884 119 987 103 1114 68" stroke="url(#rail)" stroke-width="2.5" stroke-linecap="round"/>

  <g opacity="0.95">
    <circle cx="166" cy="282" r="6" fill="#8bb9c8"/>
    <circle cx="353" cy="266" r="6" fill="#c7aa7a"/>
    <circle cx="565" cy="113" r="6" fill="#8bb9c8"/>
    <circle cx="777" cy="159" r="6" fill="#c7aa7a"/>
    <circle cx="994" cy="107" r="6" fill="#8bb9c8"/>
  </g>

  <g transform="translate(72 66)">
    <rect x="0" y="0" width="338" height="44" rx="10" fill="#d8e8ee" fill-opacity="0.055" stroke="#d8e8ee" stroke-opacity="0.13"/>
    <text x="18" y="28" fill="#9fb5be" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" letter-spacing="1.3">SYSTEMS / PRODUCT / AI</text>
  </g>

  <g transform="translate(72 139)">
    <text fill="#f1eee6" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="64" font-weight="760" letter-spacing="0">Nikola Cehic</text>
    <text y="52" fill="#c6d2d7" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="520">Senior Fullstack Engineer</text>
    <text y="92" fill="#91a7b1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">AI systems, Web3 infrastructure, and data-heavy product surfaces.</text>
  </g>

  <g transform="translate(742 202)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#ced9dc">
    <rect x="0" y="0" width="326" height="94" rx="14" fill="#d8e8ee" fill-opacity="0.055" stroke="#d8e8ee" stroke-opacity="0.14"/>
    <text x="20" y="30" fill="#8bb9c8">traceable systems</text>
    <text x="20" y="55" fill="#c7aa7a">chain infrastructure</text>
    <text x="20" y="80" fill="#d3d1c8">interfaces that make state readable</text>
  </g>
</svg>
