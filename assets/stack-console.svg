      <text x="22" y="74" fill="#f1eee7" font-size="23" font-weight="740">TypeScript / Go / Rust / JavaScript</text>
    </g>
    <g transform="translate(502 130)">
      <rect width="390" height="116" fill="#0c1113" fill-opacity="0.82" stroke="#d7e9e9" stroke-opacity="0.14"/>
      <text x="22" y="34" fill="#91a0a6" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">B / FRONTEND</text>
      <text x="22" y="74" fill="#f1eee7" font-size="23" font-weight="740">React / Next.js / TanStack / Angular</text>
    </g>
    <g transform="translate(944 130)">
