<svg width="1400" height="560" viewBox="0 0 1400 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Production experience ledger</title>
  <desc id="desc">A timeline showing production engineering experience from 2019 through 2026.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="560">
      <stop stop-color="#06090a"/>
      <stop offset="1" stop-color="#111311"/>
    </linearGradient>
    <linearGradient id="line" x1="90" y1="0" x2="1284" y2="0">
      <stop stop-color="#d3b77e"/>
      <stop offset="0.5" stop-color="#9fc4cd"/>
      <stop offset="1" stop-color="#f1eee7"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="560" rx="24" fill="url(#bg)"/>
  <rect x="1" y="1" width="1398" height="558" rx="23" stroke="#d7e9e9" stroke-opacity="0.13"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="60" y="58" fill="#a9cdd6" font-size="13" letter-spacing="1.5">CH.02 / PRODUCTION LEDGER</text>
    <text x="60" y="88" fill="#f1eee7" font-size="24" font-weight="700">7+ years moving through real-time systems, identity, marketplaces, DAOs, and chain infrastructure.</text>
  </g>
  <line x1="96" y1="270" x2="1304" y2="270" stroke="url(#line)" stroke-width="3" stroke-linecap="round"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#91a0a6">
    <text x="90" y="310">2019</text>
    <text x="300" y="310">2020</text>
    <text x="510" y="310">2022</text>
    <text x="740" y="310">2023</text>
    <text x="962" y="310">2024</text>
    <text x="1230" y="310">2026</text>
  </g>
  <g>
    <circle cx="118" cy="270" r="7" fill="#d3b77e"/>
    <circle cx="356" cy="270" r="7" fill="#d3b77e"/>
    <circle cx="548" cy="270" r="7" fill="#9fc4cd"/>
    <circle cx="760" cy="270" r="7" fill="#9fc4cd"/>
    <circle cx="1010" cy="270" r="7" fill="#f1eee7"/>
    <circle cx="1268" cy="270" r="7" fill="#f1eee7"/>
  </g>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <g transform="translate(60 340)">
      <text x="0" y="0" fill="#f1eee7" font-size="24" font-weight="740">IBS</text>
      <text x="0" y="30" fill="#bbc6c9" font-size="15">Betting platforms, live odds,</text>
      <text x="0" y="52" fill="#bbc6c9" font-size="15">WebSockets, Angular, Vue.</text>
    </g>
    <g transform="translate(300 142)">
      <text x="0" y="0" fill="#f1eee7" font-size="24" font-weight="740">Daon</text>
      <text x="0" y="30" fill="#bbc6c9" font-size="15">Identity admin UI, mobile web</text>
      <text x="0" y="52" fill="#bbc6c9" font-size="15">views, team coordination.</text>
    </g>
    <g transform="translate(510 340)">
      <text x="0" y="0" fill="#f1eee7" font-size="24" font-weight="740">TX Services</text>
      <text x="0" y="30" fill="#bbc6c9" font-size="15">JobCloud, Angular/RxJS,</text>
      <text x="0" y="52" fill="#bbc6c9" font-size="15">NestJS, GraphQL, NX libs.</text>
    </g>
    <g transform="translate(730 142)">
      <text x="0" y="0" fill="#f1eee7" font-size="24" font-weight="740">Terraform Labs</text>
      <text x="0" y="30" fill="#bbc6c9" font-size="15">Enterprise DAO, v2 rebuild,</text>
      <text x="0" y="52" fill="#bbc6c9" font-size="15">Hub, indexer, Pulsar streams.</text>
    </g>
    <g transform="translate(990 340)">
      <text x="0" y="0" fill="#f1eee7" font-size="24" font-weight="740">SEDA</text>
      <text x="0" y="30" fill="#bbc6c9" font-size="15">Explorer, treasury, design system,</text>
      <text x="0" y="52" fill="#bbc6c9" font-size="15">Go publishers, APIs, tests.</text>
    </g>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#91a0a6">
    <rect x="70" y="458" width="1260" height="46" fill="#0c1113" fill-opacity="0.72" stroke="#d7e9e9" stroke-opacity="0.12"/>
    <text x="94" y="487">PRODUCTION THREAD: REAL-TIME UI -> ENTERPRISE IDENTITY -> MARKETPLACE PLATFORM -> DAO SYSTEMS -> CHAIN INFRA -> APPLIED AI</text>
  </g>
