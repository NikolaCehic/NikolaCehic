  <text x="1320" y="92" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="2.6" fill="#7fa8b2" fill-opacity="0.9">BELGRADE · REMOTE · EU</text>

