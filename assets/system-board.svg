  </defs>
  <rect width="1400" height="520" rx="24" fill="url(#bg)"/>
  <rect x="1" y="1" width="1398" height="518" rx="23" stroke="#d7e9e9" stroke-opacity="0.13"/>
  <rect width="1400" height="520" rx="24" fill="url(#grid)"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
