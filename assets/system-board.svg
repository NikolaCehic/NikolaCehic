    <text x="60" y="114" fill="#92a0a5" font-size="13">INDEXERS / GOVERNANCE / AGENTS / DERIVATION / CONTENT PIPELINES</text>
  </g>

  <path d="M108 360 C286 260 400 356 534 250 C664 148 812 324 958 208 C1088 104 1160 214 1292 154" stroke="url(#wire)" stroke-width="2.5" stroke-linecap="round"/>
  <g fill="#a9cdd6">
