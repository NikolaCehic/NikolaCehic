<svg width="1400" height="520" viewBox="0 0 1400 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Flagship system board</title>
  <desc id="desc">A dark system board listing flagship work and the production signals behind each project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="520">
      <stop stop-color="#070b0d"/>
      <stop offset="1" stop-color="#11100e"/>
    </linearGradient>
    <linearGradient id="wire" x1="80" y1="354" x2="1280" y2="148">
      <stop stop-color="#a9cdd6"/>
      <stop offset="1" stop-color="#d3b77e"/>
