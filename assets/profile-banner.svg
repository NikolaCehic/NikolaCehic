<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 480" width="1400" height="480" role="img" aria-labelledby="tP dP">
  <title id="tP">Nikola Cehic, Senior Fullstack Engineer</title>
  <desc id="dP">A senior engineering profile banner: identity left, refined systems map right, restrained proof strip below.</desc>

  <defs>
