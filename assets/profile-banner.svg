<svg width="1400" height="680" viewBox="0 0 1400 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Nikola Cehic portfolio-style GitHub profile banner</title>
  <desc id="desc">Dark cinematic system-map banner for a senior fullstack engineer focused on crypto infrastructure and AI systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050809"/>
      <stop offset="0.42" stop-color="#071014"/>
      <stop offset="1" stop-color="#11110f"/>
    </linearGradient>
    <linearGradient id="accent" x1="88" y1="472" x2="1318" y2="166" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d8efe9"/>
      <stop offset="0.45" stop-color="#9fc4cd"/>
      <stop offset="1" stop-color="#d8bd84"/>
    </linearGradient>
    <linearGradient id="softRail" x1="0" y1="0" x2="1400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#98bec8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#98bec8" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#98bec8" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="88" height="88" patternUnits="userSpaceOnUse" patternTransform="skewX(-12)">
      <path d="M 88 0 L 0 0 0 88" stroke="#e4f2f1" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="beam" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect width="1400" height="680" rx="30" fill="url(#bg)"/>
  <rect x="1" y="1" width="1398" height="678" rx="29" stroke="#d7e9e9" stroke-opacity="0.13"/>
  <rect width="1400" height="680" rx="30" fill="url(#grid)"/>
  <rect y="76" width="1400" height="1" fill="#d7e9e9" fill-opacity="0.08"/>
  <rect x="72" y="586" width="1256" height="1" fill="#d7e9e9" fill-opacity="0.1"/>

  <g opacity="0.55">
    <path d="M128 452 L312 366 L514 430 L694 306 L880 398 L1116 258 L1280 338" stroke="#d8e8e8" stroke-opacity="0.18" stroke-width="1.2"/>
    <path d="M188 602 L386 552 L520 606 L722 530 L904 612 L1110 516 L1306 576" stroke="#d8e8e8" stroke-opacity="0.13" stroke-width="1.1"/>
    <path d="M312 366 L386 552 M694 306 L722 530 M1116 258 L1110 516 M514 430 L520 606" stroke="#d8e8e8" stroke-opacity="0.11" stroke-width="1"/>
    <path d="M86 530 C258 494 420 506 552 464 C666 428 698 326 816 326 C982 326 1136 240 1318 166" stroke="url(#accent)" stroke-width="2.3" stroke-linecap="round"/>
  </g>

  <g opacity="0.6">
    <path d="M248 -40 L82 648" stroke="url(#softRail)" stroke-width="2" filter="url(#beam)"/>
    <path d="M598 -48 L416 690" stroke="url(#softRail)" stroke-width="2" filter="url(#beam)"/>
    <path d="M1020 -34 L846 690" stroke="url(#softRail)" stroke-width="2" filter="url(#beam)"/>
    <path d="M1300 -30 L1180 688" stroke="url(#softRail)" stroke-width="2" filter="url(#beam)"/>
  </g>

  <g fill="#a6cbd4">
    <circle cx="128" cy="452" r="4"/>
    <circle cx="312" cy="366" r="4"/>
    <circle cx="514" cy="430" r="4"/>
    <circle cx="694" cy="306" r="5"/>
    <circle cx="880" cy="398" r="4"/>
    <circle cx="1116" cy="258" r="4"/>
    <circle cx="1280" cy="338" r="4"/>
  </g>
  <g fill="#d3b77e">
    <circle cx="386" cy="552" r="4"/>
    <circle cx="722" cy="530" r="4"/>
    <circle cx="1110" cy="516" r="4"/>
  </g>
  <circle cx="694" cy="306" r="24" stroke="#9fc4cd" stroke-opacity="0.42"/>
  <path d="M670 306 H718 M694 282 V330" stroke="#9fc4cd" stroke-opacity="0.42"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" letter-spacing="1.1">
    <text x="96" y="40" fill="#f1eee7" font-weight="700">Nikola Cehic</text>
    <text x="220" y="40" fill="#91a0a6">SR. FULLSTACK</text>
    <text x="392" y="40" fill="#f1eee7">01 Work</text>
    <text x="496" y="40" fill="#8d969a">02 Profile</text>
    <text x="628" y="40" fill="#8d969a">03 Experience</text>
    <text x="802" y="40" fill="#8d969a">04 AI</text>
    <text x="884" y="40" fill="#8d969a">05 Stack</text>
    <text x="998" y="40" fill="#8d969a">06 Contact</text>
  </g>

  <g transform="translate(72 132)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <circle cx="0" cy="10" r="4" fill="#9fc4cd" filter="url(#glow)"/>
    <text x="20" y="15" fill="#c6d2d4" font-size="15" letter-spacing="1.6">AVAILABLE Q3 / REMOTE / EUROPE</text>
  </g>

  <g transform="translate(72 188)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="0" y="0" fill="#f5f1e9" font-size="84" font-weight="760">Senior Fullstack</text>
    <text x="0" y="88" fill="#f5f1e9" font-size="84" font-weight="760">Engineer for</text>
    <text x="0" y="176" fill="#a9cdd6" font-size="84" font-weight="760">crypto infrastructure</text>
    <text x="0" y="264" fill="#f5f1e9" font-size="84" font-weight="760">and AI systems.</text>
    <text x="0" y="328" fill="#bbc6c9" font-size="21" font-weight="450">7+ years across Web3, fintech, and infrastructure-heavy platforms.</text>
    <text x="0" y="360" fill="#bbc6c9" font-size="21" font-weight="450">React surfaces on Go indexers, PostgreSQL models, Cosmos SDK apps,</text>
    <text x="0" y="392" fill="#bbc6c9" font-size="21" font-weight="450">agent harnesses, eval loops, and public API layers.</text>
  </g>

  <g transform="translate(880 354)">
    <rect width="430" height="232" fill="#0b0e0f" fill-opacity="0.72" stroke="#d7e9e9" stroke-opacity="0.22"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
      <text x="26" y="34" fill="#8d969a" letter-spacing="1.2">STATUS</text>
      <text x="164" y="34" fill="#b8d7dd" letter-spacing="1.2" font-weight="700">SIGNAL LOCK</text>
      <line x1="26" y1="52" x2="404" y2="52" stroke="#d7e9e9" stroke-opacity="0.16"/>
      <text x="26" y="88" fill="#8d969a">Domain</text>
      <text x="164" y="88" fill="#f1eee7">Crypto / AI / real-time</text>
      <text x="26" y="126" fill="#8d969a">Stack</text>
      <text x="164" y="126" fill="#f1eee7">Go / TS / React / LLMs</text>
      <text x="26" y="164" fill="#8d969a">Mode</text>
      <text x="164" y="164" fill="#f1eee7">Remote / async</text>
      <text x="26" y="202" fill="#8d969a">Focus</text>
      <text x="164" y="202" fill="#f1eee7">Agents / infra / UX</text>
      <rect x="356" y="191" width="48" height="4" fill="#9fc4cd"/>
      <rect x="390" y="153" width="14" height="4" fill="#9fc4cd"/>
    </g>
  </g>

  <g transform="translate(72 604)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" letter-spacing="0.8" fill="#c2ccce">
    <text x="0" y="0" font-weight="700">7+YEARS SHIPPING PRODUCTION</text>
    <text x="220" y="0">SEDA</text>
    <text x="302" y="0">TERRAFORM LABS</text>
    <text x="466" y="0">COSMOS SDK</text>
    <text x="604" y="0">AI EVALS</text>
    <text x="728" y="0">REACT / TS / GO</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#8e999c" opacity="0.52">
    <text x="92" y="444">N: INDEXER</text>
    <text x="608" y="300">N: AGENT</text>
    <text x="1058" y="248">N: EVALS</text>
    <text x="198" y="556">N: API</text>
    <text x="700" y="554">N: RAG</text>
    <text x="1124" y="542">N: REAL-TIME</text>
    <text x="1230" y="150">TX</text>
    <text x="1010" y="136">AI</text>
    <text x="924" y="625">DAO</text>
  </g>
