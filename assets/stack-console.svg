<svg width="1400" height="560" viewBox="0 0 1400 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Engineering stack console</title>
  <desc id="desc">A categorized console of Nikola Cehic's engineering stack.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="560">
      <stop stop-color="#060a0b"/>
      <stop offset="1" stop-color="#11100e"/>
    </linearGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" stroke="#d7e9e9" stroke-opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="1400" height="560" rx="24" fill="url(#bg)"/>
  <rect x="1" y="1" width="1398" height="558" rx="23" stroke="#d7e9e9" stroke-opacity="0.13"/>
  <rect width="1400" height="560" rx="24" fill="url(#grid)"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
